# CI workflow — runs linting and tests on every push/PR to main.
#
# This is the core GitHub Actions configuration for the project.
# See docs/github_actions.md for a detailed walkthrough.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Check formatting with black
        run: uv run black --check src/ tests/

      - name: Run tests
        run: uv run pytest -v
